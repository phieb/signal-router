services:
  signal-cli:
    image: ghcr.io/asamk/signal-cli:latest-native
    restart: unless-stopped
    command: >
      -a ${SIGNAL_PHONE_NUMBER}
      daemon --http 0.0.0.0:8080
    volumes:
      - signal-data:/var/lib/signal-cli
    networks:
      - signal-net

  signal-router:
    build: .
    restart: unless-stopped
    environment:
      SIGNAL_CLI_URL: ws://signal-cli:8080
      SIGNAL_PHONE_NUMBER: ${SIGNAL_PHONE_NUMBER}
      WEBHOOK_URLS: ${WEBHOOK_URLS}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      ALLOWED_SENDERS: ${ALLOWED_SENDERS:-}
      API_KEY: ${API_KEY:-}
      SEND_PORT: ${SEND_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${SEND_PORT:-8080}:${SEND_PORT:-8080}"
    depends_on:
      - signal-cli
    networks:
      - signal-net

volumes:
  signal-data:

networks:
  signal-net:
