services:
  signal-cli:
    image: ghcr.io/asamk/signal-cli:latest-native
    restart: unless-stopped
    command: >
      -a ${SIGNAL_PHONE_NUMBER}
      daemon --tcp 0.0.0.0:7583
    volumes:
      - signal-data:/var/lib/signal-cli
    networks:
      - signal-net

  signal-router:
    build: .
    restart: unless-stopped
    environment:
      SIGNAL_CLI_URL: tcp://signal-cli:7583
      WEBHOOK_URLS: ${WEBHOOK_URLS}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      ALLOWLIST_SENDERS: ${ALLOWLIST_SENDERS:-}
      API_KEY: ${API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8081:8081"
    volumes:
      - router-data:/data
    depends_on:
      - signal-cli
    networks:
      - signal-net

volumes:
  signal-data:
  router-data:

networks:
  signal-net:
